# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

silent: false

env:
  ENV: development

dotenv: [".env", "{{.ENV}}/.env.", "{{.HOME}}/.env"]

vars:
  CONFIG: hugo.yaml
  NAME: 00000000-init
  LOG_LEVEL: debug
  PORT: 1313
  HOST:
    127.0.0.1
    # sh: ifconfig en0 | grep 'inet ' | awk '{ print $2 }'

tasks:
  default:
    cmd: task --list

  prec:
    desc: All preconditions
    preconditions:
      - test -f $(which hugo)
    internal: true

  build:
    desc: Build static site
    deps:
      - prec
    cmd: hugo -D -E -F

  serve:
    desc: Run local development server with hugo
    deps:
      - prec
    cmd: hugo server -D -E -F --bind {{.HOST}} --port {{.PORT}} --baseURL "http://{{.HOST}}:{{.PORT}}" --noHTTPCache --ignoreCache --gc --renderStaticToDisk --forceSyncStatic --logLevel {{.LOG_LEVEL}} --minify --watch --printMemoryUsage --templateMetricsHints --templateMetrics --disableFastRender --renderStaticToDisk --printUnusedTemplates --printPathWarnings --printI18nWarnings --cleanDestinationDir --config ./{{.CONFIG}} --theme "mishka-dev"

  new:
    desc: "Create new post from archetype (usage: task new SLUG=my-post)"
    deps:
      - prec
    requires:
      vars: [SLUG]
    cmd: hugo new content/posts/{{.SLUG}}/index.md

  new:page:
    desc: "Create new standalone page from archetype (usage: task new:page SLUG=my-page)"
    deps:
      - prec
    requires:
      vars: [SLUG]
    cmd: hugo new --kind page content/{{.SLUG}}.md

  update.theme:
    desc: Update all git submodules - now is only themes/PaperMod
    deps:
      - prec
    preconditions:
      - test -f $(which git)
    cmds:
      - git submodule update --init --recursive --remote

  mermaid:render:
    desc: Pre-render mermaid blocks from content/**/*.md to assets/mermaid/<sha256>.svg
    preconditions:
      - test -f $(which python3)
      - test -f $(which npx)
    cmd: python3 scripts/mermaid-prerender.py
