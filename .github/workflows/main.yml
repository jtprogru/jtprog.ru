---
name: CI
'on':
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - name: Do a git checkout including submodules
        uses: actions/checkout@master
        with:
          submodules: true
          fetch-depth: 0 # нужна история коммитов для git diff в IndexNow-шаге

      - name: Generate and deploy website
        uses: jtprogru/hugo-rsync-deployment@master
        env:
          VPS_DEPLOY_KEY: ${{secrets.DEPLOY_SSH_KEY}}
          VPS_DEPLOY_USER: ${{secrets.DEPLOY_USER}}
          VPS_DEPLOY_HOST: ${{secrets.DEPLOY_HOST}}
          VPS_DEPLOY_DEST: ${{secrets.DEPLOY_TARGET_PATH}}
        with:
          hugo-version: '0.161.1'
          hugo-arguments: '--minify'
          hugo-config: 'hugo.yaml'
          rsync-arguments: '--archive --compress --delete'
          robots-txt-source: 'content/robots.txt'

      - name: Ping Yandex Webmaster sitemap
        if: ${{ success() }}
        run: curl -s
          "https://webmaster.yandex.ru/ping?sitemap=https://jtprog.ru/sitemap.xml"

      # Уведомляет участников IndexNow (Bing, Yandex, Seznam, Naver…) о реально
      # изменившихся страницах. Google в IndexNow не входит. Ключ публичный,
      # его файл лежит в static/<KEY>.txt → https://jtprog.ru/<KEY>.txt.
      - name: Compute changed URLs for IndexNow
        id: indexnow-urls
        if: ${{ success() }}
        env:
          INDEXNOW_KEY: f5059cf9a4a60e4b769ca074324beb1b
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash scripts/indexnow.sh

      - name: Submit changed pages to IndexNow
        if: ${{ success() && steps.indexnow-urls.outputs.count != '0' && steps.indexnow-urls.outputs.count != '' }}
        # main @ 2026-06-02 (docs(changelog): cut v0.5.0)
        uses: jtprogru/indexnow@da0ce6b0e524a9293f075bbf4dfe961b662eaa10
        with:
          key: f5059cf9a4a60e4b769ca074324beb1b
          file: ${{ steps.indexnow-urls.outputs.urls-file }}
          host: jtprog.ru
          fail-on: never

      - name: Telegram Notify
        if: always()
        uses: jtprogru/notiflow@v1.6.1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id:   ${{ secrets.TELEGRAM_USER_ID }}
          status:    ${{ job.status }}
          message_template: |
            *Deploy status*: {{.StatusEmoji}}
            *Project*: `{{.Repo}}`
            *Runs on*: {{.ServerUrl}}/{{.Repo}}/tree/{{.Sha}}
            *Branch*: `{{.Ref}}`
