<svg width="1050" height="480" viewBox="0 0 1050 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Что происходит, когда ты открываешь сайт</title>
<desc>Разрез здания: этажи — слои сетевого стека от браузера до приложения. Нить запроса спускается вниз и возвращается наверх. Светится ровно одно окно — этаж, на котором живёт проблема.</desc>

<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2327"/>
    <stop offset="100%" stop-color="#181c20"/>
  </linearGradient>
  <linearGradient id="litWin" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fb923c"/>
    <stop offset="100%" stop-color="#c2410c"/>
  </linearGradient>
</defs>

<!-- база: прямые края, весь холст, без rx -->
<rect x="0" y="0" width="1050" height="480" fill="url(#bgGrad)"/>

<!-- тихая структурная сетка -->
<g stroke="#333b41" stroke-width="0.5" opacity="0.45">
  <line x1="0" y1="80" x2="1050" y2="80"/>
  <line x1="0" y1="160" x2="1050" y2="160"/>
  <line x1="0" y1="240" x2="1050" y2="240"/>
  <line x1="0" y1="320" x2="1050" y2="320"/>
  <line x1="0" y1="400" x2="1050" y2="400"/>
  <line x1="150" y1="0" x2="150" y2="480"/>
  <line x1="300" y1="0" x2="300" y2="480"/>
  <line x1="450" y1="0" x2="450" y2="480"/>
  <line x1="750" y1="0" x2="750" y2="480"/>
  <line x1="900" y1="0" x2="900" y2="480"/>
</g>

<!-- ================= ЛЕВАЯ КОЛОНКА: текст ================= -->

<text x="70" y="178" font-family="'PT Sans', sans-serif" font-size="32" font-weight="700" fill="#e6e1d9">Что происходит, когда ты</text>
<text x="70" y="214" font-family="'PT Sans', sans-serif" font-size="32" font-weight="700" fill="#e6e1d9">открываешь сайт</text>

<text x="70" y="248" font-family="'PT Sans', sans-serif" font-size="17" fill="#9aa0a4">от нажатия Enter до пикселя на экране</text>

<!-- разделитель -->
<line x1="70" y1="296" x2="190" y2="296" stroke="#333b41" stroke-width="1"/>

<!-- тезис -->
<text x="70" y="334" font-family="'PT Sans', sans-serif" font-size="16" fill="#9aa0a4">«сайт тормозит» — это не магия:</text>
<text x="70" y="358" font-family="'PT Sans', sans-serif" font-size="16" fill="#fdba74">у проблемы всегда есть свой этаж</text>

<!-- подпись канала -->
<text x="70" y="434" font-family="'JetBrains Mono', monospace" font-size="13" fill="#fdba74">Мишка на сервере · @jtprogru_channel</text>

<!-- ================= ПРАВАЯ КОЛОНКА: разрез здания ================= -->

<!-- крыша -->
<rect x="592" y="56" width="376" height="10" rx="2" fill="#252b30" stroke="#333b41" stroke-width="1"/>

<!-- этаж 0: browser · render -->
<rect x="600" y="72" width="360" height="50" rx="3" fill="#252b30" stroke="#333b41" stroke-width="1"/>
<rect x="928" y="84" width="26" height="26" rx="2" fill="#1e2327" stroke="#333b41" stroke-width="1"/>
<text x="664" y="97" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9aa0a4">browser · render</text>

<!-- этаж 1: DNS -->
<rect x="600" y="128" width="360" height="50" rx="3" fill="#252b30" stroke="#333b41" stroke-width="1"/>
<rect x="928" y="140" width="26" height="26" rx="2" fill="#1e2327" stroke="#333b41" stroke-width="1"/>
<text x="664" y="153" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9aa0a4">DNS</text>

<!-- этаж 2: TCP · TLS — СМЫСЛОВОЙ ЦЕНТР, единственный очаг янтаря -->
<rect x="600" y="184" width="360" height="50" rx="3" fill="#252b30" stroke="#fb923c" stroke-width="1.5"/>
<rect x="928" y="196" width="26" height="26" rx="2" fill="url(#litWin)" stroke="#fb923c" stroke-width="1"/>
<text x="664" y="209" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#fdba74">TCP · TLS</text>
<!-- свет из окна: слои непрозрачных линий, без blur -->
<g stroke="#fb923c" stroke-width="2" stroke-linecap="round">
  <line x1="962" y1="199" x2="1004" y2="199" opacity="0.35"/>
  <line x1="962" y1="209" x2="1022" y2="209" opacity="0.6"/>
  <line x1="962" y1="219" x2="1004" y2="219" opacity="0.35"/>
</g>

<!-- этаж 3: IP · BGP -->
<rect x="600" y="240" width="360" height="50" rx="3" fill="#252b30" stroke="#333b41" stroke-width="1"/>
<rect x="928" y="252" width="26" height="26" rx="2" fill="#1e2327" stroke="#333b41" stroke-width="1"/>
<text x="664" y="265" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9aa0a4">IP · BGP</text>

<!-- этаж 4: kernel · softirq -->
<rect x="600" y="296" width="360" height="50" rx="3" fill="#252b30" stroke="#333b41" stroke-width="1"/>
<rect x="928" y="308" width="26" height="26" rx="2" fill="#1e2327" stroke="#333b41" stroke-width="1"/>
<text x="664" y="321" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9aa0a4">kernel · softirq</text>

<!-- этаж 5: nginx · app -->
<rect x="600" y="352" width="360" height="50" rx="3" fill="#252b30" stroke="#333b41" stroke-width="1"/>
<rect x="928" y="364" width="26" height="26" rx="2" fill="#1e2327" stroke="#333b41" stroke-width="1"/>
<text x="664" y="377" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9aa0a4">nginx · app</text>

<!-- фундамент -->
<rect x="592" y="406" width="376" height="10" rx="2" fill="#252b30" stroke="#333b41" stroke-width="1"/>

<!-- нить запроса: вниз по стеку -->
<line x1="624" y1="66" x2="624" y2="396" stroke="#9aa0a4" stroke-width="1.5"/>
<path d="M 618 394 L 624 406 L 630 394 Z" fill="#9aa0a4"/>

<!-- нить ответа: обратно наверх -->
<g opacity="0.45">
  <line x1="638" y1="406" x2="638" y2="78" stroke="#9aa0a4" stroke-width="1.5"/>
  <path d="M 632 80 L 638 68 L 644 80 Z" fill="#9aa0a4"/>
</g>

</svg>
