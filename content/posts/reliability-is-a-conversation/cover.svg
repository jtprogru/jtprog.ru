<svg width="1050" height="480" viewBox="0 0 1050 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Надёжность строится в диалоге с бизнесом</title>
<desc>Две равноправные стороны — SRE и бизнес — ведут встречный диалог, замкнутый на единственный горящий янтарём документ error budget policy в центре; снизу намечен квартальный цикл пересмотра.</desc>
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2327"/>
    <stop offset="100%" stop-color="#181c20"/>
  </linearGradient>
  <linearGradient id="policyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fb923c"/>
    <stop offset="100%" stop-color="#c2410c"/>
  </linearGradient>
</defs>

<!-- база: прямые края, весь холст, без rx -->
<rect x="0" y="0" width="1050" height="480" fill="url(#bgGrad)"/>

<!-- тихая структурная сетка -->
<g stroke="#333b41" stroke-width="0.5" opacity="0.45">
  <line x1="0" y1="120" x2="1050" y2="120"/>
  <line x1="0" y1="300" x2="1050" y2="300"/>
  <line x1="0" y1="390" x2="1050" y2="390"/>
  <line x1="262" y1="120" x2="262" y2="390"/>
  <line x1="525" y1="120" x2="525" y2="390"/>
  <line x1="788" y1="120" x2="788" y2="390"/>
</g>

<!-- Заголовок -->
<text x="525" y="55" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="30" font-weight="700" fill="#e6e1d9">Надёжность строится в диалоге с бизнесом</text>
<text x="525" y="84" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="15" fill="#9aa0a4">SLO становится контрактом только через error budget policy</text>

<!-- ЛЕВАЯ СТОРОНА: SRE (нейтральная) -->
<rect x="70" y="200" width="190" height="86" rx="10" fill="#252b30" stroke="#333b41" stroke-width="1.5"/>
<text x="165" y="234" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="20" font-weight="700" fill="#e6e1d9">SRE</text>
<text x="165" y="262" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="13" fill="#9aa0a4">техническая</text>
<text x="165" y="279" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="13" fill="#9aa0a4">доступность</text>

<!-- ПРАВАЯ СТОРОНА: бизнес / product (нейтральная, равноправная) -->
<rect x="790" y="200" width="190" height="86" rx="10" fill="#252b30" stroke="#333b41" stroke-width="1.5"/>
<text x="885" y="234" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="20" font-weight="700" fill="#e6e1d9">product</text>
<text x="885" y="262" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="13" fill="#9aa0a4">продуктовая</text>
<text x="885" y="279" text-anchor="middle" font-family="'PT Sans', sans-serif"
      font-size="13" fill="#9aa0a4">надёжность</text>

<!-- ВСТРЕЧНЫЕ СТРЕЛКИ: диалог в обе стороны (нейтральные) -->
<defs>
  <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#9aa0a4"/>
  </marker>
  <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#9aa0a4"/>
  </marker>
</defs>
<!-- SRE -> policy (верхняя дуга вправо) -->
<line x1="268" y1="228" x2="408" y2="228" stroke="#9aa0a4" stroke-width="2" marker-end="url(#arrR)"/>
<!-- policy -> product -->
<line x1="642" y1="228" x2="782" y2="228" stroke="#9aa0a4" stroke-width="2" marker-end="url(#arrR)"/>
<!-- product -> policy (нижняя дуга влево) -->
<line x1="782" y1="258" x2="642" y2="258" stroke="#9aa0a4" stroke-width="2" marker-end="url(#arrL)"/>
<!-- policy -> SRE -->
<line x1="408" y1="258" x2="268" y2="258" stroke="#9aa0a4" stroke-width="2" marker-end="url(#arrL)"/>

<!-- СМЫСЛОВОЙ ЦЕНТР: единственный горящий очаг — error budget policy -->
<rect x="412" y="186" width="226" height="114" rx="12" fill="#252b30" stroke="#fb923c" stroke-width="2.5"/>
<!-- горящая корешковая полоса слева документа -->
<rect x="412" y="186" width="10" height="114" rx="5" fill="url(#policyGrad)"/>
<text x="528" y="216" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="15" font-weight="700" fill="#fdba74">error budget policy</text>
<!-- строки "документа" -->
<g stroke="#fb923c" stroke-width="2" opacity="0.85" stroke-linecap="round">
  <line x1="448" y1="238" x2="608" y2="238"/>
  <line x1="448" y1="252" x2="592" y2="252"/>
  <line x1="448" y1="266" x2="608" y2="266"/>
</g>
<!-- "подпись" продуктового владельца -->
<path d="M450 285 q14 -12 26 0 t26 0 t22 -2" fill="none" stroke="#fdba74" stroke-width="2.2" stroke-linecap="round"/>
<text x="588" y="290" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="10" fill="#9aa0a4">signed</text>

<!-- НИЖНИЙ ВИТОК: квартальный цикл (тихий, нейтральный) -->
<path d="M360 350 A 165 30 0 0 0 690 350" fill="none" stroke="#333b41" stroke-width="1.5" stroke-dasharray="5 6"/>
<path d="M690 350 A 165 30 0 0 0 360 350" fill="none" stroke="#333b41" stroke-width="1.5" stroke-dasharray="5 6"/>
<polygon points="360,350 350,345 350,355" fill="#9aa0a4"/>
<polygon points="690,350 700,345 700,355" fill="#9aa0a4"/>
<text x="525" y="362" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="11" fill="#9aa0a4">квартальный пересмотр</text>

<!-- Подпись канала -->
<text x="525" y="442" text-anchor="middle" font-family="'JetBrains Mono', monospace"
      font-size="12" fill="#fdba74">Мишка на сервере · @jtprogru_channel</text>
</svg>
