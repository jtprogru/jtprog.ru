---
# === Идентичность сайта ===
baseURL: "https://jtprog.ru"
language: "ru-RU"
defaultContentLanguage: "ru"
theme: "mishka"
title: "Мишка на сервере"
copyright: "[CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/) &copy; / Mikhail (jtprogru) Savin / Commit: @@@COMMIT@@@"

# === Output / выдача ===
outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - RSS

# === Hugo-features ===
enableRobotsTXT: false
enableEmoji: true
enablegitinfo: true
forcesyncstatic: true
canonifyURLs: true
buildDrafts: false
buildFuture: false
buildExpired: false
summaryLength: 15
pluralizeListTitles: true

pagination:
  pagerSize: 10

minify:
  disableXML: true
  minifyOutput: true

services:
  googleAnalytics:
    id: G-NK4TC343YF

related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70

frontmatter:
  date: ["date", "publishDate", "lastmod"]
  lastmod: [":git", "lastmod", "date", "publishDate"]
  publishDate: ["publishDate", "date"]
  expiryDate: ["expiryDate"]

# === Меню ===
menu:
  main:
    - identifier: cv
      name: CV
      url: https://savinmi.ru
      weight: 1
    - identifier: donations
      name: "Поддержать"
      url: "/donations/"
      weight: 2
    - identifier: projects
      name: "Проекты"
      url: "/projects/"
      weight: 3
    - identifier: archives
      name: "Архив"
      url: "/archives/"
      weight: 4
    - identifier: search
      name: "Поиск"
      url: "/search/"
      weight: 5

# === Markup ===
markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
      passthrough:
        delimiters:
          block:
            - - '\['
              - '\]'
            - - $$
              - $$
          inline:
            - - '\('
              - '\)'
        enable: true
    parser:
      attribute: true
      autoHeadingID: true
      autoHeadingIDType: github
      # Не оборачивать одиночные картинки в <p>. Render-image hook отдаёт
      # <figure>, и обёртка <p><figure>...</figure></p> и невалидна по HTML,
      # и не принимается Telegram Instant View («<img> is not supported in <p>»).
      wrapStandAloneImageWithinParagraph: false
    renderer:
      hardWraps: false
      unsafe: false
      xhtml: false
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: true
    style: onedark
    tabWidth: 4

# === Кеши ===
caches:
  assets:
    dir: ":resourceDir/_gen"
    maxAge: -1
  images:
    dir: ":cacheDir/images"
    maxAge: -1
  modules:
    dir: ":cacheDir/modules"
    maxAge: -1

# === Mounts ===
module:
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes

# === Параметры темы Mishka ===
params:
  env: production
  author: "jtprogru"
  mainSections: ["post"]
  dateFormat: "2006-01-02 15:04"
  defaultTheme: auto
  comments: false

  # --- UI-флаги ---
  ShowReadingTime: true
  ShowShareButtons: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  relatedMax: 5
  cover:
    hidden: false        # hide everywhere but not in structured data
    hiddenInList: false  # hide on list pages and home
    hiddenInSingle: false # hide on single page

  # --- KaTeX подключается лениво:
  # math.html auto-detect'ит формулы по `$$` / `\(` в .RawContent
  # или по `math: true` во frontmatter поста. KaTeX не грузится на
  # 99% страниц (home, listings, посты без формул). ---
  mathRenderer: katex

  opengraph: true
  twitter_cards: true

  PWA:
    enabled: false

  # --- Шапка / иконки ---
  label:
    text: "Мишка на сервере"
    icon: /fav-light.svg
    iconHeight: 45
  assets:
    favicon: /favicon.svg
    favicon16x16: /favicon-16x16.svg
    favicon32x32: /favicon-32x32.svg
    apple_touch_icon: /apple-touch-icon.svg
    safari_pinned_tab: /safari-pinned-tab.svg
    disableFingerprinting: true

  editPost:
    URL: "https://github.com/jtprogru/jtprog.ru/blob/main/content"
    Text: "Edit..."
    appendFilePath: true

  # --- Главная: блок «Мои проекты» ---
  homeSections:
    projects:
      enabled: true        # показывать блок «Мои проекты» на главной
      featuredOnly: true   # true: показывать только проекты с `featured: true` в data/projects.yaml
      limit: 6             # потолок карточек; если featuredOnly=true и избранных меньше — вернётся столько, сколько есть
      moreLink: /projects/ # ссылка «Все проекты →» под сеткой; пусто = не показывать

  # --- Profile-mode (hero на главной) ---
  profileMode:
    enabled: true
    title: "Мишка на сервере"
    subtitle: |
      Привет, `%username%`! Меня зовут Михаил aka `jtprogru` — и это блог про SRE, DevOps и системное администрирование.
      Подписывайся на [telegram-канал](https://t.me/jtprogru_channel) или заходи в [telegram-чат](https://t.me/jtprogru_chat).
    imageUrl: "/avatar.webp"
    imageTitle: "jtprogru"
    imageWidth: 160
    imageHeight: 160
    latestPostsCount: 6

  # Альтернатива profileMode (не используется одновременно).
  homeInfoParams:
    Title: "Привет, `%username%`!"
    Content: |+
      Меня зовут Михаил aka `jtprogru` и добро пожаловать на страницы моего блога.
      Подписывайся на [telegram-канал](https://t.me/jtprogru_channel) или заходи в
      [telegram-чат](https://t.me/jtprogru_chat) и задавай вопросы.

  # --- Social icons ---
  socialIcons:
    - name: telegram
      url: "https://t.me/jtprogru_chat"
    - name: github
      url: "https://github.com/jtprogru"
    - name: dev
      url: "https://dev.to/jtprogru"
    - name: linkedin
      url: "https://www.linkedin.com/in/jtprogru"
    - name: unsplash
      url: "https://unsplash.com/@jtprogru"
    - name: cv
      url: "https://savinmi.ru"
    - name: rss
      url: "/index.xml"

  # --- Поиск ---
  # Опции Fuse вынесены в data/fuse.yaml — Hugo lower-case'ит ключи
  # внутри params, а Fuse такие ключи игнорирует. Data-файлы сохраняют case.

  # --- Аналитика ---
  analytics:
    google:
      SiteVerificationTag: "7XYgVY2xnjODEkc6HA_dLMdLSQDNEQ3v5bG40MpnB0U"
    yandex:
      SiteVerificationTag: "766a09b06b27e0f2"
  metrics:
    yandexMetrics: 31190141
