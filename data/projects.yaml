# Список проектов для блока «Мои проекты» на главной и страницы /projects/.
#
# Поля:
#   name      — заголовок карточки (моноширинно).
#   url       — внешняя ссылка (обычно GitHub).
#   desc      — короткое описание (1-2 строки).
#   lang      — основной язык/стек, тег справа от названия.
#   status    — active | maintenance | archived. Влияет на группу на /projects/.
#               Если поле опущено — попадает в «Прочее».
#   featured  — true поднимает карточку на главную (см. params.homeSections.projects)
#               и в группу «Избранное» на /projects/.
#   tags      — массив тегов для будущих фильтров (опционально).
